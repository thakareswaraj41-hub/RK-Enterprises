<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | RK ERP</title>
    <style>
        body { 
            font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; 
            background-color: #F5F5DC; /* Light Skin/Beige Base */
        }
        .skin-accent { background-color: #E8D7C5; }
        .skin-dark { background-color: #D2B48C; } /* Tan for buttons */
        .input-focus:focus { border-color: #A39171; outline: none; }
    </style>
</head>
<body class="flex h-screen text-gray-800">
    <div class="hidden lg:flex w-1/2 skin-accent items-center justify-center border-r border-[#D2B48C]">
        <div class="text-center">
            <h1 class="text-5xl font-bold tracking-tight text-[#5D574F]">RK ENTERPRISES</h1>
            <p class="text-[#8C8273] mt-2 tracking-widest text-sm uppercase">Engineering Excellence</p>
        </div>
    </div>
    
    <div class="w-full lg:w-1/2 flex items-center justify-center p-10 bg-white">
        <div class="w-full max-w-md">
            <h2 class="text-3xl font-bold mb-2 text-[#5D574F]">Login</h2>
            <p class="text-gray-500 mb-8">Access your ERP dashboard</p>
            
            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Username</label>
                    <input type="text" name="username" placeholder="Enter username" 
                        class="w-full p-3 rounded bg-[#FAF9F6] border border-[#E8D7C5] input-focus transition shadow-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" 
                        class="w-full p-3 rounded bg-[#FAF9F6] border border-[#E8D7C5] input-focus transition shadow-sm" required>
                </div>
                
                <button class="w-full skin-dark text-white py-3 rounded font-bold hover:opacity-90 transition shadow-md">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-sm text-gray-500 flex justify-between">
                <a href="/signup" class="hover:text-[#A39171]">Create Account</a>
                <a href="/forgot" class="hover:text-[#A39171]">Forgot Password?</a>
            </div>
        </div>
    </div>
</body>
</html>
